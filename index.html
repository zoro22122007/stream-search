<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AnimeHub | Ultimate Experience</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="glow-bg"></div>
    <div class="noise-overlay"></div>
    <div id="notificationHost"></div>

    <div id="infoModal" class="modal" onclick="if(event.target == this) closeModal()">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal()">&times;</span>
            <div id="modalBody" class="modal-flex"></div>
        </div>
    </div>

    <nav class="sidebar">
        <div class="logo" onclick="setMode('top/anime', 'topAnime')">A<span>H</span></div>
        <div class="nav-links-vertical">
            <button class="nav-btn active" id="topAnime" onclick="setMode('top/anime', 'topAnime')" title="Anime"><i class="fas fa-tv"></i></button>
            <button class="nav-btn" id="topManga" onclick="setMode('top/manga', 'topManga')" title="Manga"><i class="fas fa-book-open"></i></button>
            <button class="nav-btn" id="topNovels" onclick="setMode('top/manga?type=novel', 'topNovels')" title="Novels"><i class="fas fa-scroll"></i></button>
            <button class="nav-btn" id="trending" onclick="setMode('seasons/now', 'trending')" title="Trending"><i class="fas fa-fire"></i></button>
            <button class="nav-btn" id="myList" onclick="setMode('mylist', 'myList')" title="Collection"><i class="fas fa-bookmark"></i></button>
            <div class="nav-divider"></div>
            <button class="nav-btn dice-btn" onclick="getRandom()" title="Surprise Me"><i class="fas fa-dice"></i></button>
        </div>
    </nav>

    <div class="main-content">
        <header class="top-nav">
            <div class="search-wrapper" id="searchWrapper">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="Search across titles..." autocomplete="off">
            </div>
            <button id="clearAllBtn" class="clear-btn" onclick="clearFullList()" style="display: none;">
                <i class="fas fa-trash-alt"></i> Clear Collection
            </button>
        </header>

        <section class="hero-header">
            <h1 id="sectionTitle">Global Top Rated</h1>
            <div class="accent-line"></div>
            
            <div class="genre-container" id="genreContainer">
                <button class="genre-tag active" onclick="filterByGenre(null, this)">All</button>
                <button class="genre-tag" onclick="filterByGenre(1, this)">Action</button>
                <button class="genre-tag" onclick="filterByGenre(2, this)">Adventure</button>
                <button class="genre-tag" onclick="filterByGenre(4, this)">Comedy</button>
                <button class="genre-tag" onclick="filterByGenre(8, this)">Drama</button>
                <button class="genre-tag" onclick="filterByGenre(10, this)">Fantasy</button>
                <button class="genre-tag" onclick="filterByGenre(22, this)">Romance</button>
                <button class="genre-tag" onclick="filterByGenre(24, this)">Sci-Fi</button>
            </div>
        </section>

        <main class="results-grid" id="resultsGrid"></main>
    </div>

    <script src="app.js"></script>
</body>
</html>
