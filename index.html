<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AniKai | Portal</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-overlay"></div>

    <nav class="navbar">
        <div class="nav-left">
            <div class="logo" onclick="resetAndLoad('top')">Ani<span>Kai</span></div>
            <div class="nav-links">
                <button onclick="resetAndLoad('top')" class="nav-item active" id="topBtn">Top Anime</button>
                <button onclick="resetAndLoad('manga')" class="nav-item" id="mangaBtn">Top Manga</button>
                <button onclick="resetAndLoad('trending')" class="nav-item" id="trendBtn">Trending</button>
            </div>
        </div>
        <div class="search-bar-top">
            <i class="fas fa-search"></i>
            <input type="text" id="searchInput" placeholder="Search anime or manga..." autocomplete="off">
        </div>
    </nav>

    <header class="hero-minimal">
        <h2 id="sectionTitle">Highest Rated Anime</h2>
    </header>

    <main class="results-grid" id="resultsGrid"></main>

    <div class="load-more-container">
        <button id="loadMoreBtn" onclick="loadMore()">Load More Content</button>
    </div>

    <script src="app.js"></script>
</body>
</html>
